# Descriptor for the Tehsil entity dataset.
#
# Source modes:
#   Pan India layers  → type="item" + stac_item (schema/CRS) + source (S3 override)
#   WFS layers        → type="collection" + sample_item (collection URL) + url_template (WFS URL construction)
#
# Resolution and temporal_pattern are auto-detected from STAC table:columns.


entity = "basin"
key = "ba_id"
geometry = "geometry"
base = "basin_vector"

add_admin = true

[[layers]]
name = "basin_vector"
type = "item"
source = "s3://geo-benchmark-data/stac_pan_india/basin.geojson"

[layers.scale]
area_in_ha = 100

[layers.rename]
area_sqkm = "area_in_ha"
shape_Leng = "shape_length"
Shape_Area = "shape_area"
ba_id = "basin_id"
ba_name = "basin_name"
objectid = "object_id"
