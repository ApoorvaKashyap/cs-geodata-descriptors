# Descriptor for the MWS (Micro-Watershed) entity dataset.
#
# Sources:
#   Static layers (base geometry) — CoreStack S3, Pan India GeoJSON file
#   Attribute layers (terrain, aquifer, soge) — CoreStack GeoServer WFS, tehsil-partitioned
#   Temporal layers — CoreStack GeoServer WFS, tehsil-partitioned
#
# Source modes:
#   Pan India layers  → type="item" + stac_item (schema/CRS) + source (S3 override)
#   WFS layers        → type="collection" + sample_item (collection URL) + url_template (WFS URL construction)
#
# Resolution and temporal_pattern are auto-detected from STAC table:columns.
#
# Outputs:
#   mws/static.geoparquet      (partitioned by sub_basin via super layer)
#   mws/annual.parquet
#   mws/fortnightly.parquet
#
# URL_MAPPING = {
#     "soge": "https://geoserver.core-stack.org:8443/geoserver/soge/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=soge%3Asoge_vector_{district}_{tehsil}&outputFormat=application%2Fjson",
#     "cropping_intensity": "https://geoserver.core-stack.org:8443/geoserver/crop_intensity/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=crop_intensity%3A{district}_{tehsil}_intensity&outputFormat=application%2Fjson",
#     "terrain": "https://geoserver.core-stack.org:8443/geoserver/terrain/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=terrain%3A{district}_{tehsil}_cluster&outputFormat=application%2Fjson",
#     "deltaG_fortnight": "https://geoserver.core-stack.org:8443/geoserver/mws_layers/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=mws_layers%3AdeltaG_fortnight_{district}_{tehsil}&outputFormat=application%2Fjson",
#     "deltaG_well_depth": "https://geoserver.core-stack.org:8443/geoserver/mws_layers/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=mws_layers%3AdeltaG_well_depth_{district}_{tehsil}&outputFormat=application%2Fjson",
#     "aquifer": "https://geoserver.core-stack.org:8443/geoserver/aquifer/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=aquifer%3Aaquifer_vector_{district}_{tehsil}&outputFormat=application%2Fjson",
# }

entity = "mws"
key = "mws_id"
geometry = "geometry"
base = "mws_boundaries"
min_version = 1.1
max_version = 2
active_locations = "s3://geo-benchmark-data/metadata/mws_layer_version.csv"

# Super layer for hierarchical partitioning
super_layer_source = "s3://geo-benchmark-data/stac_pan_india/basin.geojson"
super_layer_key = "ba_id"
super_field = "ba_name"
partition_by ="basin_name"   # Partition by super field
add_admin = true # Spatial join to fill state/district/tehsil for rows with null admin cols

[[layers]]
name = "mws_boundaries"
type = "item"
source = "s3://geo-benchmark-data/base_converted/mws_basins.parquet"
drop = ["id"]

[layers.rename]
uid = "mws_id"
geom = "geometry"
ba_name = "basin_name"

[[layers]]
name = "terrain"
type = "collection"
url_template = "https://geoserver.core-stack.org:8443/geoserver/terrain/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=terrain%3A{district}_{tehsil}_cluster&outputFormat=application%2Fjson"
drop = ["area_in_ha", "id", "bacode", "sbcode"]

[layers.rename]
uid = "mws_id"
terrainClu = "cluster_id"
valley_are = "valley_area"
hill_slope = "hill_slope_area"
geom = "geometry"

[[layers]]
name = "aquifer"
type = "collection"
url_template = "https://geoserver.core-stack.org:8443/geoserver/aquifer/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=aquifer%3Aaquifer_vector_{district}_{tehsil}&outputFormat=application%2Fjson"
drop = ["id", "area_in_ha", "test"]

[layers.rename]
uid = "mws_id"
Age = "age"
Lithology_ = "lithology_type"
Major_Aqui = "major_aquifer"
Major_Aq_1 = "major_aquifer_code"
Principal_ = "principal_aq_system_name"
Recommende = "recommended_class"
"yeild__" = "yield_pct"
geom = "geometry"
newcode14 = "principal_aquifer_code"
newcode43 = "major_aquifer_code"
avg_mbgl = "decadal_avg_depth_mbgl"
mbgl = "fractures_encountered_mbgl"
per_cm = "quality_ec_microhomhos_per_cm"
pa_order = "principal_aquifer_numeric_code"

[[layers]]
name = "soge"
type = "collection"
url_template = "https://geoserver.core-stack.org:8443/geoserver/soge/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=soge%3Asoge_vector_{district}_{tehsil}&outputFormat=application%2Fjson"
drop = [
    "OGC_FID",
    "soge_objec",
    "area_in_ha",
    "soge_block",
    "soge_distr",
    "soge_state",
    "soge_tehsi",
]

[layers.rename]
uid = "mws_id"
agwd_dom_i = "agwd_dom_ind"
agwd_tot = "agwd_total"
pct_area_s = "pct_area_asmnt"
sgw_dev_pe = "sgw_dev_pct"
geom = "geometry"

[[layers]]
name = "deltaG_well_depth"
type = "collection"
url_template = "https://geoserver.core-stack.org:8443/geoserver/mws_layers/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=mws_layers%3AdeltaG_well_depth_{district}_{tehsil}&outputFormat=application%2Fjson"
drop = ["area_in_ha", "id", "sbcode", "bacode"]

[layers.rename]
uid = "mws_id"
weighted_a = "weighted_avg_yld_aqfr"
geom = "geometry"

[[layers]]
name = "cropping_intensity"
type = "collection"
url_template = "https://geoserver.core-stack.org:8443/geoserver/crop_intensity/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=crop_intensity%3A{district}_{tehsil}_intensity&outputFormat=application%2Fjson"
drop = ["area_in_ha", "total_cropable_area_ever_hydroyear_2017_2024", "id", "sbcode", "bacode"]

[layers.rename]
uid = "mws_id"
sum = "sum_cropped"
geom = "geometry"

[[layers]]
name = "deltaG_fortnight"
type = "collection"
url_template = "https://geoserver.core-stack.org:8443/geoserver/mws_layers/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=mws_layers%3AdeltaG_fortnight_{district}_{tehsil}&outputFormat=application%2Fjson"
drop = ["area_in_ha", "id", "sbcode", "bacode"]
resolution = "fortnightly"

[layers.rename]
uid = "mws_id"
geom = "geometry"

[[layers]]
name = "drought_index"
type = "collection"
url_template = "https://geoserver.core-stack.org:8443/geoserver/cropping_drought/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=cropping_drought%3A{district}_{tehsil}_drought&outputFormat=application%2Fjson"
drop = ["OGC_FID", "id"]

[layers.rename]
uid = "mws_id"
area_in_ha = "area_ha"
geom = "geometry"
"drlb_*" = "drought_label_*"
"drysp_*" = "dryspell_*"
"frth0_*" = "drought_freq_t0_*"
"frth1_*" = "drought_freq_t1_*"
"frth2_*" = "drought_freq_t2_*"
"frth3_*" = "drought_freq_t3_*"
"inth0_*" = "drought_intensity_t0_*"
"inth1_*" = "drought_intensity_t1_*"
"inth2_*" = "drought_intensity_t2_*"
"inth3_*" = "drought_intensity_t3_*"
"kh_cr_*" = "kharif_cropped_ha_*"
"m_ons_*" = "monsoon_onset_*"
"pcr_k_*" = "pecentage_kharif_cropped_*"
"rd*" = "rainfall_deviation_*"
"t_wks_*" = "total_analysed_weeks_*"
"w_mld_*" = "mild_drought_weeks_*"
"w_mod_*" = "moderate_drought_weeks_*"
"w_no_*" = "no_drought_weeks_*"
"w_sev_*" = "severe_drought_weeks_*"


[layers.scale]
"kh_cr_*" = 100