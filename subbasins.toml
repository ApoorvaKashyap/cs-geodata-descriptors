# Descriptor for the Tehsil entity dataset.
#
# Source modes:
#   Pan India layers  → type="item" + stac_item (schema/CRS) + source (S3 override)
#   WFS layers        → type="collection" + sample_item (collection URL) + url_template (WFS URL construction)
#
# Resolution and temporal_pattern are auto-detected from STAC table:columns.


entity = "basin"
key = "ba_id"
geometry = "geometry"
base = "subbasin"

add_admin = true

[[layers]]
name = "subbasin"
type = "item"
source = "s3://geo-benchmark-data/stac_pan_india/subbasin_boundaries_vector.geojson"

[layers.scale]
area_in_ha = 100

[layers.rename]
area_sqkm = "area_in_ha"
bacode = "basin_id"
ba_name = "basin_name"
objectid = "object_id"
sub_basin = "sub_basin_name"
