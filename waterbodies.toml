# Descriptor for the Tehsil entity dataset.
#
# Source modes:
#   Pan India layers  → type="item" + stac_item (schema/CRS) + source (S3 override)
#   WFS layers        → type="collection" + sample_item (collection URL) + url_template (WFS URL construction)
#
# Resolution and temporal_pattern are auto-detected from STAC table:columns.


entity = "waterbody"
key = "wb_id"
geometry = "geometry"
base = "pan_india_waterbodies"
add_admin = true

[converted_files.static]
partition_by = ["ba_name"]
row_group_size = 22000

[converted_files.annual]
partition_by = ["ba_name"]
row_group_size = 280000

[converted_files.sub_annual]
partition_by = ["ba_name", "year"]
row_group_size = 280000


[[layers]]
name = "pan_india_waterbodies"
type = "item"
source = "/home/apoorva/CoREStack-Data/base_converted/new_wb.parquet"
drop = ["OGC_FID", "category_sq_m"]

[layers.scale]
area_in_ha = 0.0001
"area_ha_*" = 0.0001

[layers.rename]
total_area_m2 = "area_in_ha"
"k_*" = "kharif_*"
"kr_*" = "karif_rabi_*"
"krz_*" = "kharif_rabi_zaid_*"
"area_*" = "area_ha_*"
geom = "geometry"
basin = "ba_name"
